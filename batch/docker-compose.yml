x-minioconf: &minioconf
  image: minio/minio:latest
  command: server /data --console-address ":9001"
  environment:
    - MINIO_ROOT_USER=admin
    - MINIO_ROOT_PASSWORD=pass1234

x-sparkworker: &sparkworker
  image: apache/spark:latest
  command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://100.71.201.92:7077 --cores 1 --memory 1G --webui-port 8081
  
services:
  minio1:
    <<: *minioconf
    ports:
      - 9000:9000
      - 9001:9001
    hostname: s3_1
    container_name: s3_1
    volumes:
      - s31:/data

  minio2:
    <<: *minioconf
    ports:
      - 9002:9000
      - 9003:9001
    hostname: s3_2
    container_name: s3_2
    volumes:
      - s32:/data

  worker1:
    <<: *sparkworker
    hostname: worker1
    container_name: worker1
    ports:
      - 8081:8081
  
  worker2:
    <<: *sparkworker
    hostname: worker2
    container_name: worker2
    ports:
      - 8082:8081

  worker3:
    <<: *sparkworker
    hostname: worker3
    container_name: worker3
    ports:
      - 8083:8081

volumes:
  s31:
  s32:


